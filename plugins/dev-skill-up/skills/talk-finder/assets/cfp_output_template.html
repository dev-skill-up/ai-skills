<!DOCTYPE html>
<!--
  CFP output template for the talk-finder skill.

  HOW TO USE (for the model):
  Build the page by replacing the JS data block marked DATA_START / DATA_END
  with the real answers. Each entry becomes a card with its own Copy button.
  - title:  the field label (e.g. "Abstract", "Audience takeaways")
  - hint:   optional small grey note (char limit, track, etc.). Use "" to omit.
  - value:  the answer text. Use \n for line breaks; they render as paragraphs.
  Set HEADER_TITLE to the conference name + topic. You may add or remove fields
  freely. Keep everything in this one file so it opens with a double-click.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CFP answers</title>
<style>
  :root {
    --bg: #f6f7f9; --card: #ffffff; --ink: #1a1d21; --muted: #6b7280;
    --line: #e5e7eb; --accent: #2f6df6; --accent-ink: #ffffff; --ok: #1a8a4a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 32px 16px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header h1 { font-size: 20px; margin: 0 0 4px; }
  header p { color: var(--muted); margin: 0 0 24px; font-size: 14px; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 18px 18px 16px; margin-bottom: 16px;
  }
  .card-head {
    display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
    margin-bottom: 10px;
  }
  .card-head .label { font-weight: 600; font-size: 15px; }
  .card-head .hint { color: var(--muted); font-size: 12px; font-weight: 400; }
  .value { white-space: pre-wrap; }
  .value p { margin: 0 0 10px; }
  .value p:last-child { margin-bottom: 0; }
  .copy-btn {
    flex: 0 0 auto; cursor: pointer; border: 1px solid var(--line);
    background: var(--accent); color: var(--accent-ink); font-size: 13px;
    padding: 6px 12px; border-radius: 8px; font-weight: 600; transition: background .15s;
  }
  .copy-btn:hover { filter: brightness(1.05); }
  .copy-btn.copied { background: var(--ok); }
  footer { color: var(--muted); font-size: 12px; text-align: center; margin-top: 24px; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 id="header-title">HEADER_TITLE</h1>
      <p>Click Copy on any field, then paste it into the submission form.</p>
    </header>
    <div id="cards"></div>
    <footer>Generated by the talk-finder skill.</footer>
  </div>

<script>
  // DATA_START — replace this array with the real CFP answers.
  const FIELDS = [
    { title: "Title", hint: "", value: "Your talk title here" },
    { title: "Abstract", hint: "e.g. max 600 chars", value: "First paragraph.\nSecond paragraph." },
    { title: "Description / notes to organizers", hint: "", value: "Scope, structure, and why you." },
    { title: "Audience takeaways", hint: "", value: "Takeaway one.\nTakeaway two.\nTakeaway three." }
  ];
  // DATA_END

  const cards = document.getElementById("cards");
  FIELDS.forEach((f) => {
    const card = document.createElement("div");
    card.className = "card";

    const head = document.createElement("div");
    head.className = "card-head";

    const labelWrap = document.createElement("div");
    const label = document.createElement("span");
    label.className = "label";
    label.textContent = f.title;
    labelWrap.appendChild(label);
    if (f.hint) {
      const hint = document.createElement("span");
      hint.className = "hint";
      hint.textContent = "  " + f.hint;
      labelWrap.appendChild(hint);
    }

    const btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.textContent = "Copy";
    btn.addEventListener("click", () => {
      navigator.clipboard.writeText(f.value).then(() => {
        btn.textContent = "Copied";
        btn.classList.add("copied");
        setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 1400);
      });
    });

    head.appendChild(labelWrap);
    head.appendChild(btn);

    const value = document.createElement("div");
    value.className = "value";
    f.value.split("\n").forEach((line) => {
      const p = document.createElement("p");
      p.textContent = line;
      value.appendChild(p);
    });

    card.appendChild(head);
    card.appendChild(value);
    cards.appendChild(card);
  });

  const ht = document.getElementById("header-title");
  if (ht.textContent === "HEADER_TITLE") ht.textContent = "Your CFP answers";
</script>
</body>
</html>
